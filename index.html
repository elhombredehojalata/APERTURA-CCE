<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SGP - Aperturas de Diligencias</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/docxtemplater/3.28.5/docxtemplater.js"></script>
    <script src="https://unpkg.com/pizzip@3.1.1/dist/pizzip.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg: #f1f5f9; --card: #ffffff; --text: #1e293b; --primary: #0284c7;
            --success: #16a34a; --border: #cbd5e1; --label: #475569;
        }
        body.dark-mode {
            --bg: #0f172a; --card: #1e293b; --text: #f1f5f9; --primary: #38bdf8;
            --success: #10b981; --border: #334155; --label: #94a3b8;
        }
        * { box-sizing: border-box; transition: 0.2s ease; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .app-container { width: 100%; max-width: 900px; background: var(--card); padding: 35px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .theme-toggle { align-self: flex-end; margin-bottom: 10px; background: var(--card); border: 1px solid var(--border); padding: 8px 15px; border-radius: 50px; cursor: pointer; color: var(--text); font-weight: 600; font-size: 0.8rem; display: flex; align-items: center; gap: 8px; }
        h1 { font-size: 1.8rem; color: var(--primary); text-align: center; margin-top: 0; text-transform: uppercase; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 15px; margin-top: 15px; }
        label { display: block; font-size: 0.85rem; font-weight: 700; color: var(--label); margin-bottom: 5px; text-transform: uppercase; }
        input, textarea, select { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid var(--border); background: var(--bg); color: var(--text); font-size: 1rem; }
        .info-pills { background: rgba(2, 132, 199, 0.1); padding: 10px; border-radius: 8px; margin-top: 5px; font-size: 0.85rem; color: var(--primary); font-weight: 600; }
        .btn-main { width: 100%; background: var(--primary); color: white; padding: 18px; border-radius: 12px; border: none; font-size: 1.1rem; font-weight: 700; cursor: pointer; margin-top: 25px; }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 100; align-items: center; justify-content: center; padding: 20px; }
        .modal-content { background: var(--card); width: 100%; max-width: 600px; padding: 30px; border-radius: 20px; }
        .resumen-item { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid var(--border); }
        .modal-btns { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 25px; }
        .btn-edit { background: #64748b; color: white; padding: 12px; border-radius: 10px; border: none; cursor: pointer; }
        .btn-confirm { background: var(--success); color: white; padding: 12px; border-radius: 10px; border: none; cursor: pointer; font-weight: 700; }
    </style>
</head>
<body>

<button class="theme-toggle" onclick="document.body.classList.toggle('dark-mode')">🌓 CAMBIAR MODO</button>

<div class="app-container">
    <h1>⚖️ APERTURAS - FLAGRANCIA</h1>
    
    <form id="docForm">
        <div class="grid">
            <div>
                <label>Fiscalía</label>
                <select id="num_fiscalia">
                    <option value="PRIMERA">PRIMERA</option>
                    <option value="SEGUNDA">SEGUNDA</option>
                    <option value="TERCERA">TERCERA</option>
                </select>
            </div>
            <div>
                <label>Comisaría PNP</label>
                <select id="personal_pnp">
                    <option value="CPNP CASTILLA">CPNP CASTILLA</option>
                    <option value="CPNP PIURA">CPNP PIURA</option>
                    <option value="CPNP SAN MARTIN">CPNP SAN MARTÍN</option>
                    <option value="CPNP 26 DE OCTUBRE">CPNP 26 DE OCTUBRE</option>
                    <option value="CPNP TACALÁ">CPNP TACALÁ</option>
                </select>
            </div>
        </div>

        <div class="grid">
            <div>
                <label>Fiscal Responsable</label>
                <select id="nombre_fiscal" onchange="actualizarIniciales()">
                    <option value="DRA. SARA RUTH YARLEQUÉ ADRIANZE">DRA. SARA RUTH YARLEQUÉ ADRIANZE</option>
                    <option value="FISCAL ADJUNTO 1">FISCAL ADJUNTO 1</option>
                    <option value="FISCAL ADJUNTO 2">FISCAL ADJUNTO 2</option>
                    <option value="FISCAL ADJUNTO 3">FISCAL ADJUNTO 3</option>
                </select>
                <div id="pill_iniciales" class="info-pills">Iniciales: SYRA</div>
            </div>
            <div>
                <label>N° de Caso</label>
                <input type="text" id="num_caso" placeholder="Ej: 456-2026">
            </div>
        </div>

        <div class="grid">
            <div>
                <label>Nombre Imputado</label>
                <input type="text" id="nombre_imputado">
            </div>
            <div>
                <label>DNI</label>
                <input type="text" id="dni" maxlength="8">
            </div>
        </div>

        <div class="grid">
            <div>
                <label>Fecha Disposición</label>
                <input type="text" id="fecha_disp">
            </div>
            <div>
                <label>Horas de Detención</label>
                <select id="horas_val" onchange="actualizarHorasTexto()">
                    <option value="24">24 HORAS</option>
                    <option value="48" selected>48 HORAS</option>
                </select>
                <div id="pill_horas" class="info-pills">En Word: 48 (CUARENTA Y OCHO) HORAS</div>
            </div>
        </div>

        <div style="margin-top:15px;">
            <label>Hechos</label>
            <textarea id="hechos" rows="4"></textarea>
        </div>

        <label class="option-box">
            <input type="checkbox" id="check_firma" hidden>
            <div class="switch"></div>
            <strong>¿Consignar Firma Digital?</strong>
        </label>

        <button type="button" class="btn-main" onclick="abrirResumen()">🔍 REVISAR Y GENERAR</button>
    </form>
</div>

<div id="modalResumen" class="modal">
    <div class="modal-content">
        <h2 style="text-align:center">Resumen de Apertura</h2>
        <div id="listaResumen"></div>
        <div class="modal-btns">
            <button class="btn-edit" onclick="cerrarResumen()">CORREGIR</button>
            <button class="btn-confirm" onclick="procesarWord()">CONFIRMAR Y DESCARGAR</button>
        </div>
    </div>
</div>

<script>
    const fiscalInfo = {
        "DRA. SARA RUTH YARLEQUÉ ADRIANZE": "SYRA",
        "FISCAL ADJUNTO 1": "FA1",
        "FISCAL ADJUNTO 2": "FA2",
        "FISCAL ADJUNTO 3": "FA3"
    };

    const horasLetras = {
        "24": "24 (VEINTICUATRO) HORAS",
        "48": "48 (CUARENTA Y OCHO) HORAS"
    };

    window.onload = function() {
        const meses = ["enero", "febrero", "marzo", "abril", "mayo", "junio", "julio", "agosto", "septiembre", "octubre", "noviembre", "diciembre"];
        const f = new Date();
        document.getElementById('fecha_disp').value = `Piura, ${f.getDate()} de ${meses[f.getMonth()]} de ${f.getFullYear()}`;
        actualizarIniciales();
        actualizarHorasTexto();
    };

    function actualizarIniciales() {
        const fiscal = document.getElementById('nombre_fiscal').value;
        const iniciales = fiscalInfo[fiscal] || "---";
        document.getElementById('pill_iniciales').innerText = `Iniciales: ${iniciales}`;
    }

    function actualizarHorasTexto() {
        const val = document.getElementById('horas_val').value;
        document.getElementById('pill_horas').innerText = `En Word: ${horasLetras[val]}`;
    }

    function abrirResumen() {
        const dataResumen = [
            { l: "Imputado", v: document.getElementById('nombre_imputado').value.toUpperCase() },
            { l: "Fiscal", v: document.getElementById('nombre_fiscal').value },
            { l: "Iniciales", v: fiscalInfo[document.getElementById('nombre_fiscal').value] },
            { l: "Plazo", v: horasLetras[document.getElementById('horas_val').value] },
            { l: "Firma", v: document.getElementById('check_firma').checked ? "SÍ" : "NO" }
        ];
        document.getElementById('listaResumen').innerHTML = dataResumen.map(i => `<div class="resumen-item"><b>${i.l}:</b> <span>${i.v}</span></div>`).join('');
        document.getElementById('modalResumen').style.display = 'flex';
    }

    function cerrarResumen() { document.getElementById('modalResumen').style.display = 'none'; }

    async function procesarWord() {
        cerrarResumen();
        const conFirma = document.getElementById('check_firma').checked;
        const archivo = conFirma ? 'MODELO_FIRMADO.docx' : 'MODELO_UNO.docx';
        const fiscalSel = document.getElementById('nombre_fiscal').value;
        const nombreImp = document.getElementById('nombre_imputado').value.toUpperCase();

        const data = {
            NUMERO_FISCALIA: document.getElementById('num_fiscalia').value,
            PERSONAL_PNP: document.getElementById('personal_pnp').value,
            NOMBRE_FISCAL: fiscalSel,
            NUMERO_CASO: document.getElementById('num_caso').value,
            NOMBRE_IMPUTADO: nombreImp,
            NUMERO_DNI: document.getElementById('dni').value,
            FECHA_DISPOSICION: document.getElementById('fecha_disp').value,
            HECHOS: document.getElementById('hechos').value,
            HORAS_DETENCION: horasLetras[document.getElementById('horas_val').value],
            INCIALES_FISCAL: fiscalInfo[fiscalSel]
        };

        try {
            const resp = await fetch(archivo);
            const content = await resp.arrayBuffer();
            const zip = new PizZip(content);
            const doc = new window.docxtemplater(zip, { paragraphLoop: true, linebreaks: true });
            doc.render(data);
            const out = doc.getZip().generate({ 
                type: "blob", 
                mimeType: "application/vnd.openxmlformats-officedocument.wordprocessingml.document",
                compression: "DEFLATE"
            });
            const file = new File([out], `APERTURA_${nombreImp.replace(/\s+/g, '_')}.docx`);
            saveAs(file, file.name);
        } catch (e) { alert("Error: Verifica los archivos .docx en tu GitHub."); }
    }
</script>
</body>
</html>
